services:
  - type: web
    name: cinematch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    branch: master
    healthCheckPath: /health
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://xuedwghljpzofgdwuhaj.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
